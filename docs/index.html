<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>論文モニター | Klotho/PF4/NK/Exosomes/sEVs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Hiragino Sans, sans-serif;
      background: #f5f6fa;
      color: #222;
      min-height: 100vh;
      font-size: 16px;
    }

    /* ===== Header ===== */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 16px;
    }
    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    header h1 {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: 0.01em;
    }
    header .subtitle {
      font-size: 0.7rem;
      color: #99a;
      margin-top: 3px;
    }
    #date-select {
      flex-shrink: 0;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #2a2a4a;
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      min-height: 44px;
    }

    /* ===== Tab bar ===== */
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 2px solid #e0e0e8;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      padding: 12px 14px;
      border: none;
      background: transparent;
      color: #666;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      min-height: 44px;
      transition: color 0.15s, background 0.15s;
    }
    .tab-btn:hover { background: #f0f0f8; color: #333; }
    .tab-btn.active {
      color: #3b5bdb;
      border-bottom-color: #3b5bdb;
      background: #f7f8ff;
    }
    .tab-badge {
      display: inline-block;
      background: #e8ecff;
      color: #3b5bdb;
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 0.7rem;
      margin-left: 4px;
    }
    .tab-btn.active .tab-badge { background: #3b5bdb; color: #fff; }

    /* ===== Main ===== */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 16px 14px 48px;
    }

    /* ===== Field section ===== */
    .field-section { margin-bottom: 24px; }
    .field-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #dde;
    }
    .field-num {
      width: 24px; height: 24px;
      background: #3b5bdb;
      color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .field-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: #333;
    }
    .field-count {
      margin-left: auto;
      font-size: 0.75rem;
      color: #999;
    }

    /* ===== Empty ===== */
    .empty-msg {
      color: #bbb;
      font-size: 0.8rem;
      padding: 8px 0 4px 32px;
    }

    /* ===== Article card ===== */
    .article-card {
      background: #fff;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      border: 1px solid #e4e4ee;
    }
    .article-title-en {
      font-size: 0.875rem;
      font-weight: 600;
      color: #1a1a2e;
      line-height: 1.45;
      margin-bottom: 4px;
    }
    .article-title-ja {
      font-size: 0.83rem;
      color: #3b5bdb;
      margin-bottom: 8px;
      line-height: 1.45;
    }
    .article-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .source-badge {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      background: #eef2ff;
      color: #4263eb;
    }
    .kw-badge {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
      background: #fff3e0;
      color: #e65100;
    }
    .article-link {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.75rem;
      color: #3b5bdb;
      text-decoration: none;
      padding: 3px 9px;
      border: 1px solid #c5d0f5;
      border-radius: 4px;
      background: #f0f3ff;
      white-space: nowrap;
    }
    .article-link:hover { background: #3b5bdb; color: #fff; border-color: #3b5bdb; }
    .article-summary {
      font-size: 0.82rem;
      color: #444;
      line-height: 1.7;
      border-top: 1px solid #f0f0f8;
      padding-top: 8px;
    }

    /* ===== Status ===== */
    .status-msg {
      text-align: center;
      padding: 60px 20px;
      color: #999;
      font-size: 0.9rem;
    }
    .no-data {
      text-align: center;
      padding: 60px 20px;
      color: #bbb;
    }
    .no-data h2 { font-size: 1rem; margin-bottom: 8px; color: #999; }
    .no-data p { font-size: 0.82rem; }

    /* ===== Mobile ===== */
    @media (max-width: 480px) {
      header h1 { font-size: 0.88rem; }
      #date-select { font-size: 16px; }  /* iOS zoom prevention */
      .tab-btn { font-size: 0.78rem; padding: 10px 12px; }
      main { padding: 12px 10px 40px; }
      .article-card { padding: 10px 11px; }
      .article-title-en { font-size: 0.84rem; }
      .article-title-ja { font-size: 0.8rem; }
      .article-summary { font-size: 0.8rem; }
      .field-section { margin-bottom: 18px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <h1>Klotho / PF4 / NK cell therapy<br>Exosomes / sEVs 論文モニター</h1>
      <div class="subtitle">日次キーワード監視レポート</div>
    </div>
    <select id="date-select" aria-label="日付を選択"></select>
  </div>
</header>

<nav class="tabs" id="tab-nav" role="tablist">
  <button class="tab-btn active" data-group="A" role="tab">
    A: 複数ヒット <span class="tab-badge" id="badge-A">0</span>
  </button>
  <button class="tab-btn" data-group="B1" role="tab">
    B1: Klotho <span class="tab-badge" id="badge-B1">0</span>
  </button>
  <button class="tab-btn" data-group="B2" role="tab">
    B2: PF4 <span class="tab-badge" id="badge-B2">0</span>
  </button>
  <button class="tab-btn" data-group="B3" role="tab">
    B3: NK cell <span class="tab-badge" id="badge-B3">0</span>
  </button>
  <button class="tab-btn" data-group="B4" role="tab">
    B4: Exosomes <span class="tab-badge" id="badge-B4">0</span>
  </button>
  <button class="tab-btn" data-group="B5" role="tab">
    B5: sEVs <span class="tab-badge" id="badge-B5">0</span>
  </button>
</nav>

<main id="main-content">
  <div class="status-msg">読み込み中...</div>
</main>

<script>
  const FIELDS = ["医学", "生物学", "農学", "工学", "産業", "ビジネス"];
  const FIELD_NUMS = { "医学": "①", "生物学": "②", "農学": "③", "工学": "④", "産業": "⑤", "ビジネス": "⑥" };

  let currentData = null;
  let currentGroup = "A";

  // ---- Init ----
  async function init() {
    try {
      const res = await fetch('./data/index.json');
      const dates = await res.json();

      const sel = document.getElementById('date-select');
      if (!dates || dates.length === 0) {
        showNoData();
        return;
      }

      dates.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d;
        if (i === 0) opt.selected = true;
        sel.appendChild(opt);
      });

      sel.addEventListener('change', () => loadDate(sel.value));
      await loadDate(dates[0]);
    } catch (e) {
      document.getElementById('main-content').innerHTML =
        '<div class="status-msg">データを読み込めませんでした。</div>';
    }
  }

  // ---- Load date ----
  async function loadDate(date) {
    document.getElementById('main-content').innerHTML = '<div class="status-msg">読み込み中...</div>';
    try {
      const res = await fetch(`./data/${date}.json`);
      currentData = await res.json();
      updateBadges();
      renderGroup(currentGroup);
    } catch (e) {
      document.getElementById('main-content').innerHTML =
        '<div class="status-msg">データの読み込みに失敗しました。</div>';
    }
  }

  // ---- Badges ----
  function updateBadges() {
    ["A", "B1", "B2", "B3", "B4", "B5"].forEach(g => {
      const el = document.getElementById(`badge-${g}`);
      if (!el) return;
      const group = currentData[g] || {};
      const count = Object.values(group).reduce((s, arr) => s + arr.length, 0);
      el.textContent = count;
    });
  }

  // ---- Render group ----
  function renderGroup(groupKey) {
    const main = document.getElementById('main-content');
    const group = (currentData && currentData[groupKey]) || {};

    const html = FIELDS.map((field, idx) => {
      const articles = group[field] || [];
      const cardsHtml = articles.length === 0
        ? '<div class="empty-msg">該当なし</div>'
        : articles.map(a => articleCard(a)).join('');

      return `
        <section class="field-section">
          <div class="field-header">
            <div class="field-num">${idx + 1}</div>
            <span class="field-name">${FIELD_NUMS[field]} ${field}</span>
            <span class="field-count">${articles.length}件</span>
          </div>
          ${cardsHtml}
        </section>`;
    }).join('');

    main.innerHTML = html || '<div class="status-msg">データなし</div>';
  }

  // ---- Article card ----
  function articleCard(a) {
    const titleEn = esc(a.title || 'タイトル不明');
    const titleJa = esc(a.title_ja || '');
    const url = a.url || '';
    const source = esc(a.source || '');
    const summary = esc(a.summary_ja || '');
    const matched = Array.isArray(a.matched_keywords) ? a.matched_keywords : [];
    const kwBadges = matched.map(kw => `<span class="kw-badge">${esc(kw)}</span>`).join('');

    return `
      <div class="article-card">
        <div class="article-title-en">${titleEn}</div>
        ${titleJa ? `<div class="article-title-ja">${titleJa}</div>` : ''}
        <div class="article-meta">
          ${source ? `<span class="source-badge">${source}</span>` : ''}
          ${kwBadges}
          ${url ? `<a class="article-link" href="${esc(url)}" target="_blank" rel="noopener">→ 記事を開く</a>` : ''}
        </div>
        ${summary ? `<div class="article-summary">${summary}</div>` : ''}
      </div>`;
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function showNoData() {
    document.getElementById('date-select').style.display = 'none';
    document.getElementById('main-content').innerHTML = `
      <div class="no-data">
        <h2>データがまだありません</h2>
        <p>GitHub Actionsが実行されると自動的にデータが追加されます。</p>
      </div>`;
  }

  // ---- Tab switching ----
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // アクティブタブをタブバー内でスクロールして中央表示
      btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      currentGroup = btn.dataset.group;
      if (currentData) renderGroup(currentGroup);
    });
  });

  init();
</script>
</body>
</html>
